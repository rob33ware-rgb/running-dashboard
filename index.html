<html lang="en-AU">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Running Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
:root{--bg:#0a0b0f;--bg-2:#10131a;--card:#14171f;--card-hi:#1b1f2a;--line:rgba(255,255,255,0.06);--line-2:rgba(255,255,255,0.10);--ink:#edeef2;--ink-2:#b7bbc7;--ink-3:#8a8f9d;--ink-4:#5a5f6e;--z-E:#5b9bff;--z-M:#3ecf8e;--z-T:#f3c14a;--z-I:#ff8c42;--z-R:#ff5a5a;--z-X:#b47cff;--z-Race:#ffd166;--z-rest:#2a2e3a;--accent:#7dd3c0;--shadow-card:0 1px 0 rgba(255,255,255,0.03) inset,0 8px 24px -12px rgba(0,0,0,0.6)}
html[data-theme="light"]{--bg:#f6f5f1;--bg-2:#eeece5;--card:#ffffff;--card-hi:#faf8f3;--line:rgba(0,0,0,0.08);--line-2:rgba(0,0,0,0.14);--ink:#14151a;--ink-2:#4a4e58;--ink-3:#737784;--ink-4:#9a9ea9;--z-rest:#e3e1da;--shadow-card:0 1px 0 rgba(255,255,255,0.6) inset,0 4px 16px -8px rgba(0,0,0,0.12)}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink)}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;font-feature-settings:'cv11','ss01','ss02';letter-spacing:-0.005em;min-height:100vh;padding-bottom:80px;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-feature-settings:'tnum','zero'}
.serif{font-family:'Fraunces',Georgia,serif}
.shell{max-width:1240px;margin:0 auto;padding:22px 18px 0}
@media(min-width:900px){.shell{padding:32px 40px 0}}
header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:8px;background:conic-gradient(from 140deg,var(--z-E),var(--z-M),var(--z-T),var(--z-I),var(--z-R),var(--z-E));mask:radial-gradient(circle at center,transparent 34%,black 36%);-webkit-mask:radial-gradient(circle at center,transparent 34%,black 36%)}
.brand-text{font-family:'Fraunces',serif;font-size:18px;font-weight:500;letter-spacing:-0.01em}
.brand-text em{font-style:italic;color:var(--ink-3);font-weight:400}
.top-meta{display:flex;align-items:center;gap:14px;color:var(--ink-3);font-size:12px}
.top-meta .mono{color:var(--ink-2)}
.theme-toggle{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--line-2);color:var(--ink-2);cursor:pointer;display:grid;place-items:center}
.theme-toggle:hover{color:var(--ink)}
nav.tabs{position:sticky;top:0;z-index:50;background:color-mix(in oklab,var(--bg) 85%,transparent);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--line);margin:0 -18px 26px;padding:10px 18px}
@media(min-width:900px){nav.tabs{margin:0 -40px 28px;padding:10px 40px}}
.tab-list{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.tab-list::-webkit-scrollbar{display:none}
.tab{appearance:none;background:transparent;border:0;color:var(--ink-3);font:inherit;font-weight:500;font-size:13px;letter-spacing:0.04em;text-transform:uppercase;padding:10px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;transition:color .15s,background .15s}
.tab:hover{color:var(--ink)}
.tab[aria-selected="true"]{color:var(--ink);background:var(--card);box-shadow:inset 0 0 0 1px var(--line-2)}
.tab .tab-idx{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-4)}
.panel{display:none;animation:fadeIn .25s ease-out}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow-card);position:relative}
.card.tight{padding:14px}
.card.flush{padding:0;overflow:hidden}
.card-title{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between}
.card-title .aside{font-weight:500;letter-spacing:0.02em;text-transform:none;color:var(--ink-4);font-size:11px;font-family:'JetBrains Mono',monospace}
.hairline{height:1px;background:var(--line);margin:14px -18px}
.zchip{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:0.04em}
.zchip .dot{width:6px;height:6px;border-radius:50%}
.zchip[data-zone="E"]{color:var(--z-E);background:color-mix(in oklab,var(--z-E) 14%,transparent)}
.zchip[data-zone="M"]{color:var(--z-M);background:color-mix(in oklab,var(--z-M) 14%,transparent)}
.zchip[data-zone="T"]{color:var(--z-T);background:color-mix(in oklab,var(--z-T) 14%,transparent)}
.zchip[data-zone="I"]{color:var(--z-I);background:color-mix(in oklab,var(--z-I) 16%,transparent)}
.zchip[data-zone="R"]{color:var(--z-R);background:color-mix(in oklab,var(--z-R) 16%,transparent)}
.zchip[data-zone="X"]{color:var(--z-X);background:color-mix(in oklab,var(--z-X) 14%,transparent)}
.zchip[data-zone="Race"]{color:var(--z-Race);background:color-mix(in oklab,var(--z-Race) 18%,transparent)}
.zchip[data-zone="rest"]{color:var(--ink-3);background:var(--z-rest)}
.zchip[data-zone="E"] .dot{background:var(--z-E)}
.zchip[data-zone="M"] .dot{background:var(--z-M)}
.zchip[data-zone="T"] .dot{background:var(--z-T)}
.zchip[data-zone="I"] .dot{background:var(--z-I)}
.zchip[data-zone="R"] .dot{background:var(--z-R)}
.zchip[data-zone="X"] .dot{background:var(--z-X)}
.zchip[data-zone="Race"] .dot{background:var(--z-Race)}
.zchip[data-zone="rest"] .dot{background:var(--ink-4)}
[data-link-workout]{cursor:pointer}
[data-link-workout]:hover .session-card,[data-link-workout].session-card:hover{border-color:var(--line-2);background:var(--card-hi)}
[data-link-workout]:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:10px}
.mobile-nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:4px;padding:6px;background:color-mix(in oklab,var(--card) 92%,transparent);backdrop-filter:blur(16px);border:1px solid var(--line-2);border-radius:999px;box-shadow:0 10px 30px -10px rgba(0,0,0,.5);z-index:60}
@media(min-width:900px){.mobile-nav{display:none}}
.mobile-nav button{appearance:none;background:transparent;border:0;color:var(--ink-3);width:46px;height:36px;border-radius:999px;cursor:pointer;display:grid;place-items:center}
.mobile-nav button[aria-selected="true"]{color:var(--ink);background:var(--card-hi)}
@media(max-width:899px){nav.tabs{display:none}}
.row{display:flex;gap:14px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:14px}
.grid{display:grid;gap:14px}
.eyebrow{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.modal-backdrop{position:fixed;inset:0;background:rgba(5,6,9,0.78);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
@media(min-width:900px){.modal-backdrop{align-items:center}}
.modal-backdrop.open{display:flex;animation:fadeIn .2s}
.modal{background:var(--card);border:1px solid var(--line-2);border-radius:18px;width:100%;max-width:620px;max-height:86vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal h3{margin:0 0 2px;font-family:'Fraunces',serif;font-weight:500;font-size:28px;letter-spacing:-0.02em}
.modal .close{position:sticky;top:0;float:right;background:var(--bg-2);border:1px solid var(--line);color:var(--ink-2);width:30px;height:30px;border-radius:50%;cursor:pointer;display:grid;place-items:center}
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th{text-align:left;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding:10px 10px 10px 0;border-bottom:1px solid var(--line)}
table.data td{padding:12px 10px 12px 0;border-bottom:1px solid var(--line);color:var(--ink)}
table.data tr:last-child td{border-bottom:0}
.chart-wrap{position:relative;height:220px;width:100%}
.chart-wrap.tall{height:280px}
.badge-gold{background:linear-gradient(135deg,#ffd166,#ff9a3c);color:#1a1207;font-weight:700;padding:6px 12px;border-radius:999px;font-size:12px;letter-spacing:0.02em;display:inline-flex;align-items:center;gap:8px}
</style>
</head>

"planned":null,"actual":null},{"date":"2026-04-30","day_num":30,"in_month":true,"is_today":false,"is_race":false,"race_title":null,"planned":null,"actual":null},{"date":"2026-05-01","day_num":1,"in_month":false,"is_today":false,"is_race":false,"race_title":null,"planned":null,"actual":null},{"date":"2026-05-02","day_num":2,"in_month":false,"is_today":false,"is_race":false,"race_title":null,"planned":null,"actual":null},{"date":"2026-05-03","day_num":3,"in_month":false,"is_today":false,"is_race":true,"race_title":"HOKA Runaway Sydney Half Marathon 2026","planned":null,"actual":null}],"prev_month_display":"March 2026","next_month_display":"May 2026"},"pbs":[{"distance":"1 km","date":"2024-08-13","time":"3:37"},{"distance":"1 mile","date":"2025-01-24","time":"6:07"},{"distance":"5 km","date":"2024-10-09","time":"20:02"},{"distance":"10 km","date":"2025-05-17","time":"44:01"},{"distance":"Half marathon","date":"2025-05-03","time":"1:39:25"},{"distance":"Farthest run","date":"2024-11-22","distance_km":30.03}],"pace_zones":[{"code":"E","label":"Easy","pace":"5:25\u20136:08","colour":"#3B82F6","use":"Recovery, long runs, aerobic base"},{"code":"M","label":"Marathon","pace":"4:55","colour":"#10B981","use":"Marathon pace, long run finishes"},{"code":"T","label":"Threshold","pace":"4:45","colour":"#EAB308","use":"Tempo runs, lactate threshold"},{"code":"I","label":"Interval","pace":"4:22","colour":"#F97316","use":"VO2max intervals (3\u20135 min)"},{"code":"R","label":"Repetition","pace":"4:04/400","colour":"#EF4444","use":"Speed, neuromuscular (30s\u201390s)"}],"predictions":[{"dist":"1 mile","time":"7:01"},{"dist":"5K","time":"21:50"},{"dist":"10K","time":"47:30"},{"dist":"HM","time":"1:43:44"},{"dist":"Full M","time":"3:27:29"}],"workouts":[{"slug":"easy-run","name":"Easy run","category":"Recovery / aerobic","zones":"E","duration":"30\u201375 min","why":"E pace builds the aerobic base \u2014 mitochondrial density, capillarisation, muscular endurance \u2014 without significant stress. Daniels' data puts E pace at **65\u201378% of VO2 max**; the specific adaptations (improved heart stroke volume, improved fat utilisation) occur here and not at faster paces. E is also what makes quality sessions recoverable: if you can't hold a conversation, you are compromising tomorrow's session.","structure":"1. The whole run is at E pace \u2014 ~5:25\u20136:08/km at VDOT 44\n2. No intervals, no surges, no tempo finishes\n3. Strides (see separate workout) can be added on one E day per week during Foundation","cues":"- Breathing should be conversational \u2014 you should be able to complete full sentences\n- Heart rate typically 65\u201378% of max; use that as a sanity check, not a target\n- If a pace feels like \"medium hard,\" you have drifted out of E. Slow down.\n- Terrain and weather shift pace by 10\u201320 sec/km \u2014 run by effort, not the watch","variations":"- **Foundation:** 3\u00d7 E runs per week (if daily running); for 3-day runners, E covers only long run + recovery pieces\n- **Early Quality / Race-Specific:** E fills warm-up + cool-down around quality\n- **Taper:** Maintain E runs at normal pace, drop total volume","sources":"- Jack Daniels, *Daniels' Running Formula* (4th ed., 2021, Human Kinetics) \u2014 E pace definition, % VO2 max table, 80/20 principle\n- [[Jack Daniels Running Formula]] \u2014 5 training paces table, weekly volume distribution\n- [Fellrnr \u2014 Jack Daniels reference](https://fellrnr.com/wiki/Jack_Daniels) \u2014 practical application notes\n\n---"},{"slug":"long-run","name":"Long run","category":"Aerobic endurance","zones":"E (mostly), optional M/HM finish","duration":"60\u2013150 min","why":"The long run is the single highest-yield session in a half-marathon build. It trains fatigue resistance (glycogen depletion tolerance, mitochondrial endurance), strengthens connective tissue, and teaches fuelling discipline. Daniels caps it at **25\u201330% of weekly mileage or 2.5 hours, whichever is less** \u2014 beyond that, injury risk rises faster than fitness gain.\n\n**Important nuance:** FIRST (Pierce/Murr/Moss) argues the long run for 3-day runners should NOT be a slow easy jog \u2014 it should be run 45\u201360 sec/mile slower than 10K pace for HM specificity. Daniels allows both: pure E for base-building phases, E with embedded M/HM segments for race-specific phases. Rob's plan blends the two.","structure":"**Base version (Foundation / recovery weeks):**\n\n1. Full run at E pace \u2014 ~5:25\u20136:08/km\n2. Distance 10\u201318 km depending on phase\n\n**Race-specific version (Race-Specific / Sharpen):**\n\n1. Start at E pace for first 60\u201370% of distance\n2. Middle or final section at M or HM goal pace (2\u20138 km depending on week)\n3. Last 1\u20132 km easy cool-down","cues":"- Fuel it \u2014 gel or carbs at 45+ min, water every 20 min once over 60 min\n- First half slower than second half (negative split) \u2014 don't start too fast\n- If the pace feels hard early, abandon the M/HM segment and finish easy\n- This is the session where consistency matters \u2014 miss one, miss the adaptation","variations":"- **Foundation:** 10\u201314 km pure E\n- **Early Quality:** 14\u201318 km E, last 2\u20133 km at M pace\n- **Race-Specific:** 16\u201320 km with 6\u201310 km at M/HM pace mid-run\n- **Taper (week \u22122):** 12\u201314 km easy\n- **Race week:** skip \u2014 race is the long effort","sources":"- Jack Daniels, *Daniels' Running Formula* (4th ed., 2021) \u2014 Long run cap (25\u201330% weekly or 2.5 hr), M-pace integration\n- Pierce, Murr, Moss, *Runner's World Run Less, Run Faster* (2021 ed.) \u2014 Long run pace prescription for 3-day runners (45\u201360 sec/mile slower than 10K)\n- [[FIRST 3-day Running Method]] \u2014 \"The long run in FIRST is NOT a slow easy jog\"\n- [[Training Phases - HM Periodisation]] \u2014 phase-specific long run structure\n\n---"},{"slug":"goal-pace-touch","name":"Goal pace touch","category":"Race-specific","zones":"E + M/HM goal","duration":"45\u201360 min","why":"Teach the legs what HM race pace feels like when fresh. Daniels places M-pace work in the Final Quality (sharpen) and Race-Specific phases specifically because **pacing is a neuromuscular skill** \u2014 runners who arrive at race day without practising goal pace consistently go out too fast. This session primes that skill without draining recovery; the volume at goal pace is deliberately short so the stress cost is low.","structure":"1. 4 km easy warm-up at E pace\n2. Main set: **2\u20133 km at HM goal pace** \u2014 4:44\u20134:49/km at VDOT 44 (M zone)\n3. 2 km easy cool-down at E pace\n\nTotal: ~8\u20139 km.","cues":"- Pace should feel \"controlled quick\" \u2014 not tempo-hard. If it's hard, it's too fast.\n- Breathing 3:3 or 2:2, not gasping\n- Check watch in the first 400m only, then lock it in by feel\n- If legs feel flat, drop to the slow end of the goal pace range. Don't force it.","variations":"- **Sharpen block (current):** 2\u20133 km at goal pace\n- **Race-Specific:** 5\u20138 km at goal pace, last 2 km M-pace finish\n- **Taper week \u22121:** 1\u20132 km at goal pace only \u2014 a \"pace check,\" not a workout\n- **Race week tune-up:** 2 km at goal pace, 2 days before race day","sources":"- Jack Daniels, *Daniels' Running Formula* (4th ed., 2021) \u2014 Ch. 7, goal-pace workouts, Final Quality phase design\n- [Coach Ray \u2014 Jack Daniels' Formulaic Approach to Periodisation](https://www.coachray.nz/2021/10/11/jack-daniels-phd-formulaic-approach-to-periodisation/) \u2014 M-pace specificity\n- [[Training Phases - HM Periodisation]] \u2014 Final Quality / Taper pace-tune-up timing\n- Mujika & Padilla, \"Scientific Bases for Precompetition Tapering Strategies,\" *Medicine & Science in Sports & Exercise* (2003) \u2014 taper intensity retention principle\n\n---"},{"slug":"short-intervals","name":"Short intervals","category":"Speed / economy","zones":"R (repetition)","duration":"45\u201355 min","why":"R-pace work targets running economy and neuromuscular efficiency \u2014 not VO2 max and not lactate threshold. Daniels defines R pace as **faster than 100% VO2 max**, which is why reps are kept short (200\u2013600m) with **full recovery** between them. The goal is to teach the legs to turn over fast without accumulating lactate. This is why R caps at **5% of weekly mileage or 8 km per session, whichever is less** \u2014 more than this crosses from \"economy work\" into \"glycolytic grind,\" which hurts recovery without improving the target system.","structure":"1. 2\u20134 km easy warm-up (E pace)\n2. Main set: **4\u20138 \u00d7 400m at R pace** \u2014 ~4:04/400m at VDOT 44 (1:37 per 400m)\n3. Recovery: 400m jog between each rep \u2014 full recovery, not rushed\n4. 2 km easy cool-down\n\nExample (Rob's current Week 01 KR2): 6E + 4\u00d7400m @ 4:22 + 2E. The 4:22 target here is conservative for his recent return-to-running context \u2014 Daniels table R-pace at VDOT 44 is 4:04.","cues":"- Each 400m should feel the **same effort** as the last \u2014 if rep 4 is slower than rep 1, you started too fast\n- Full recovery means your breathing returns to conversational before the next rep starts\n- Form first, pace second \u2014 short reps are also form drills\n- If pace drops >5 seconds between reps, stop early. R-pace reps that degrade teach bad pacing.","variations":"- **Early Quality:** 8\u00d7400m at R pace, progressing to 10\u00d7400m\n- **Sharpen (Rob's current):** 4\u00d7400m at a conservative pace (sub-R) \u2014 volume is the goal, not speed\n- **Race-Specific:** 6\u00d7600m at R pace\n- **Taper:** Skip R work; strides instead","sources":"- Jack Daniels, *Daniels' Running Formula* (4th ed., 2021) \u2014 R-pace definition, weekly cap (5% or 8 km), rep length (200\u2013600m), full recovery principle\n- [[Jack Daniels Running Formula]] \u2014 R session structure\n- Pierce, Murr, Moss, *Run Less, Run Faster* \u2014 Key Run 1 (Speed) structure (e.g. 6\u00d7800m at 5K pace, 400m jog recovery)\n- [Running with Rock \u2014 Training Explained: Jack Daniels Running Formula](https://runningwithrock.com/training-explained-jack-daniels-running-formula/) \u2014 rep cap rationale\n\n---"},{"slug":"cruise-intervals","name":"Cruise intervals","category":"Threshold","zones":"T","duration":"50\u201370 min","why":"Cruise intervals are Daniels' preferred threshold session \u2014 T-pace reps of **5\u201315 minutes with 1\u20133 minutes rest**. They deliver higher total volume at T pace than a continuous tempo run (fatigue builds more slowly when broken up), which is why they're the backbone of the Race-Specific phase for half-marathon. The target is **lactate clearance capacity** \u2014 the ability to run just below the threshold for extended periods, which is exactly what the back half of a hard HM demands.","structure":"1. 2 km easy warm-up (E pace)\n2. Main set: **4\u20135 \u00d7 1 km at T pace** \u2014 ~4:45/km at VDOT 44\n3. Recovery: 60 seconds jog/walk between reps (short rest is deliberate)\n4. 2 km easy cool-down","cues":"- T pace should feel \"comfortably hard\" \u2014 you could sustain it for ~1 hour in a race, but not relaxed\n- Short rest is the point \u2014 this is NOT a speed workout. Don't run the reps like R-pace.\n- If you can't hit the pace by rep 3, your T-pace estimate is off. Back the pace off, don't soldier on.\n- The last rep should feel the same as the first \u2014 even effort, not a fade","variations":"- **Early Quality:** 3\u00d71 km T + 1 km E + 2\u00d71 km T (split set, 1 km E between)\n- **Race-Specific (Rob's Part 2):** 4\u00d71 km T with 60s rest \u2192 5\u00d71 km T with 60s rest\n- **Taper (week \u22122):** 3\u00d71 km T \u2014 half volume, same intensity\n- **Taper (week \u22121):** 2\u00d71 km T only","sources":"- Jack Daniels, *Daniels' Running Formula* (4th ed., 2021) \u2014 Cruise interval protocol (T-pace, 5\u201315 min reps, 1\u20133 min rest)\n- [[Jack Daniels Running Formula]] \u2014 T-pace zone (88\u201392% VO2 max, ~1 hr sustainable)\n- [Fellrnr \u2014 Jack Daniels reference](https://fellrnr.com/wiki/Jack_Daniels) \u2014 cruise interval vs continuous tempo tradeoffs\n- [[Training Phases - HM Periodisation]] \u2014 T-work placement in Race-Specific phase\n\n---"},{"slug":"tempo-run","name":"Tempo run","category":"Threshold","zones":"T","duration":"40\u201360 min","why":"Continuous threshold effort \u2014 the classic \"tempo run.\" Same physiological target as cruise intervals (lactate clearance, sustained hard effort) but delivered as one unbroken block of 20\u201330 minutes at T pace. Daniels recommends cruise intervals over continuous tempo for most athletes because the total volume is higher, but tempo has its place: it trains **mental pacing discipline** in a way broken reps don't. Race effort is continuous, and the tempo run rehearses that.","structure":"1. 2 km easy warm-up (E pace)\n2. Main set: **20\u201330 min at T pace** \u2014 ~4:45/km at VDOT 44\n3. 1\u20132 km easy cool-down\n\nTotal: ~8\u201310 km.","cues":"- Pace should feel the same in minute 25 as in minute 5 \u2014 if it's getting faster, you started slow; if it's getting harder, you started too fast\n- This is the session where pacing discipline is built. Don't drift.\n- Breathe: 3:2 ratio typical. If it's 2:1, slow down.\n- No surge at the end. T pace all the way through.","variations":"- **Early Quality:** 15\u201320 min T pace (shorter)\n- **Race-Specific:** 25\u201330 min T pace (full)\n- **Sharpen:** Progression tempo \u2014 2 km at M pace, 3 km at T pace, 2 km at M pace\n- **Taper:** Skip full tempos; use cruise intervals instead","sources":"- Jack Daniels, *Daniels' Running Formula* (4th ed., 2021) \u2014 Tempo vs cruise interval tradeoffs\n- Pierce, Murr, Moss, *Run Less, Run Faster* \u2014 Key Run 2 (Tempo): 5 miles at HM goal pace; FIRST's tempo is goal-pace-specific rather than pure T-pace\n- [[FIRST 3-day Running Method]] \u2014 Key Run 2 tempo structure\n- Joe Friel, *The Triathlete's Training Bible* \u2014 pacing discipline rehearsal rationale\n\n---"},{"slug":"strides","name":"Strides","category":"Neuromuscular","zones":"R (brief)","duration":"+10 min onto an E run","why":"Strides are **not a workout** in the aerobic sense \u2014 they're neuromuscular priming. 20\u201330 seconds of fast, relaxed running with full recovery. They wake up the fast-twitch fibres, reinforce good form under speed, and cost almost nothing in recovery terms. Daniels uses them throughout Foundation (before quality starts) and Taper (to stay sharp on reduced volume). The rule: **fast but not anaerobic** \u2014 if you're gasping at the end of a stride, you went too hard.","structure":"1. Run your normal E session (6\u20138 km)\n2. In the last 2 km or after finishing: **4\u20136 \u00d7 20\u201330 seconds fast running**\n3. Full recovery between each (60\u201390 sec walking or easy jog)\n4. Finish with 200\u2013400m easy jog cool-down","cues":"- Think \"5K effort,\" not \"400m effort\" \u2014 quick but controlled\n- Focus on form: tall posture, relaxed shoulders, quick turnover, light footfall\n- If you're breathing hard at the end of a stride, slow down next time\n- Strides are a fluency drill. Do them regularly, they compound.","variations":"- **Foundation:** 4\u20136 strides after 1\u00d7 E run per week\n- **Early Quality:** 4 strides as part of the warm-up before R work\n- **Taper (race week):** 4\u00d730-sec strides 2 days before race \u2014 maintains sharpness, costs nothing","sources":"- Jack Daniels, *Daniels' Running Formula* (4th ed., 2021) \u2014 Strides protocol (6\u00d720 sec fast with full recovery)\n- [[Jack Daniels Running Formula]] \u2014 Strides in Foundation + Taper phases\n- [McMillan Running \u2014 strides guide](https://www.mcmillanrunning.com/) \u2014 fluency drill rationale\n- Pete Pfitzinger, *Advanced Marathoning* (3rd ed., 2019) \u2014 stride placement in taper\n\n---"},{"slug":"cross-training","name":"Cross-training","category":"Aerobic (non-impact)","zones":"E equivalent (HR-based)","duration":"30\u201360 min","why":"In FIRST's 3+2 structure, cross-training is what **replaces the 4 missing easy-run days**. Three runs alone don't deliver enough aerobic volume for half-marathon fitness; the cross-training days carry that load without the repetitive impact. The Furman research (Pierce/Murr/Moss) showed measurable VO2 max and lactate threshold improvements in runners who held to the 3+2 structure \u2014 but dropping the cross-training days is the single biggest failure mode of the programme.\n\n**HR is the anchor** \u2014 cross-training should feel like E pace, same heart rate range. Not recovery-easy, not threshold-hard. Steady aerobic.","structure":"Any of these for 30\u201360 minutes at E-equivalent heart rate:\n\n1. **Stationary bike** \u2014 zero impact, easy to hold HR steady\n2. **Swimming** \u2014 zero impact, adds upper body\n3. **Rowing** \u2014 aerobic + strength combined\n4. **Elliptical** \u2014 low-impact run simulation\n5. **Kettlebell circuit (home)** \u2014 what Rob uses. Aerobic format: 30s work / 30s rest, rotating swings / goblet squats / rows, 30\u201340 min.","cues":"- HR should match your E-pace HR range \u2014 same zone, different modality\n- No intervals, no max effort \u2014 this is aerobic volume, not a quality session\n- If you're breathing too hard, back off \u2014 you're cutting into recovery for the next run\n- 2 days per week minimum \u2014 dropping CT is how the programme breaks","variations":"- **Foundation:** 2\u00d730 min at easy aerobic HR\n- **Early Quality / Race-Specific:** 2\u00d745 min at easy aerobic HR\n- **Taper:** 1\u00d730 min only in race week, or rest","sources":"- Pierce, Murr, Moss, *Runner's World Run Less, Run Faster* (2021 ed.) \u2014 Cross-training prescription (30\u201360 min, easy-moderate, 2\u00d7 per week)\n- [Furman University \u2014 FIRST official](https://www.furman.edu/first/) \u2014 research results (VO2 max +4.2%, LT +2.3%)\n- [[FIRST 3-day Running Method]] \u2014 \"Cross-training is what makes 3-day running viable\"\n- [Laura Norris Running \u2014 Run Less Run Faster review](https://lauranorrisrunning.com/run-less-run-faster-review/) \u2014 CT-drop failure mode\n\n---"},{"slug":"race-day","name":"Race day","category":"Execution","zones":"HM pace (primary)","duration":"~1:43 target for VDOT 44","why":"Race day isn't a workout \u2014 it's the expression of every workout that came before it. Pacing and fuelling are what separate a finish time that matches the training from one that doesn't. Mujika & Padilla's tapering research (2003, *Medicine & Science in Sports & Exercise*) found that properly tapered athletes perform 2\u20133% better than under-tapered ones; the race-day protocol protects that taper gain by not burning it in the first 5 km.","structure":"**Pre-race (morning):**\n\n1. Wake ~3 hours before gun. Light breakfast (~400 kcal, low fibre, familiar food)\n2. Hydrate: 500 ml water + electrolyte over 2 hours\n3. Arrive 45 min before start. Toilet, bag drop, start pen.\n\n**Warm-up (15 min before start):**\n\n1. 5 min easy jog\n2. 4 \u00d7 30-sec strides at HM pace, full recovery\n3. Final toilet, into pen\n\n**Race:**\n\n1. **First 5 km:** HM goal pace minus 5 sec/km. Feel easy. Settle in.\n2. **5\u201315 km:** HM goal pace exactly (4:44\u20134:49/km at VDOT 44). Lock in.\n3. **15\u201320 km:** Hold pace. This is where the work shows.\n4. **Last 1.1 km:** Empty the tank. Negative split the final km.\n\n**Fuelling:**\n\n- Gel at 8 km and 15 km (if tolerated in training \u2014 never try a new gel on race day)\n- Water at every station; sip, don't chug","cues":"- First 3 km WILL feel too easy. That's correct. Do not race the people around you.\n- If the watch shows you 10 sec/km fast at 5 km, you are not fitter today \u2014 slow down now\n- Form check at 10 km and 16 km: tall, relaxed shoulders, quick cadence\n- Pain is expected from 17 km onwards. Separate \"discomfort\" from \"injury.\" Push through discomfort.\n- PacePro on the Forerunner 965 is preloaded with the course elevation profile \u2014 trust the watch's per-segment pace, not your average","variations":"- **C-race (HOKA 2026-05-03):** No taper \u2014 arrive from within the sharpen block. Goal is honest HM effort + a VDOT-recalibrating time, not a PB.\n- **A-race (Parramatta 2026-06-21):** Full taper complete. Race for time. Execute the plan above.\n- **B-race:** 3\u20135 day taper. Race strong but not all-out. Use as race-pace session with a bib.","sources":"- Mujika, I., & Padilla, S. (2003), \"Scientific Bases for Precompetition Tapering Strategies,\" *Medicine & Science in Sports & Exercise*, 35(7), 1182\u20131187 \u2014 2\u20133% performance improvement from proper taper\n- Jack Daniels, *Daniels' Running Formula* (4th ed., 2021), Ch. 11 \u2014 Race-day pacing\n- [McMillan Running \u2014 How to Taper for a Half Marathon](https://www.mcmillanrunning.com/) \u2014 taper execution\n- [[Training Phases - HM Periodisation]] \u2014 A/B/C race differentiation\n- Matt Fitzgerald, *80/20 Running* (2014) \u2014 negative split rationale\n- [Garmin \u2014 PacePro](https://www.garmin.com/) \u2014 Forerunner 965 course-specific pacing feature\n\n---"}],"load":{"labels":["12 Mar","15 Mar","19 Mar","22 Mar","29 Mar","2 Apr","6 Apr","16 Apr"],"ctl":[2.37,5.5,7.28,11.86,12.14,13.31,19.42,16.48],"atl":[13.42,27.38,28.37,47.21,29.24,29.37,58.02,20.55],"tsb":[0,-7.82,-12.71,-14.38,-9.75,-7.75,-6.74,-0.36],"rtss":[100.8,140.0,97.0,215.8,89.2,96.6,311.2,49.9],"current":{"ctl":16.5,"atl":20.6,"tsb":-0.4,"acwr":0.36},"flags":[{"level":"yellow","msg":"Detraining risk \u2014 ACWR 0.36. Are you tapering?"}]},"ef_trend":{"labels":["Intervals \u00b7 12 Mar","Intervals \u00b7 15 Mar","Intervals \u00b7 19 Mar","Long \u00b7 22 Mar","Intervals \u00b7 29 Mar","Intervals \u00b7 2 Apr","Long \u00b7 6 Apr","Intervals \u00b7 16 Apr"],"iso_dates":["2026-03-12","2026-03-15","2026-03-19","2026-03-22","2026-03-29","2026-04-02","2026-04-06","2026-04-16"],"values":[0.0205,0.0205,0.0206,0.0203,0.0216,0.0202,0.0203,0.0171],"decoupling":[-16.2,-11.8,-20.1,-4.9,-14.6,-11.0,-6.3,46.3]},"zone_distribution":{"E":8473,"M":1982,"T":2666,"I":0,"R":831},"dynamics_trend":{"labels":["Intervals \u00b7 12 Mar","Intervals \u00b7 15 Mar","Intervals \u00b7 19 Mar","Long \u00b7 22 Mar","Intervals \u00b7 29 Mar","Intervals \u00b7 2 Apr","Long \u00b7 6 Apr","Intervals \u00b7 16 Apr"],"iso_dates":["2026-03-12","2026-03-15","2026-03-19","2026-03-22","2026-03-29","2026-04-02","2026-04-06","2026-04-16"],"cadence":[173.0,166.0,170.0,168.0,174.0,168.0,170.0,163.0],"gct":[249.85,266.57,254.8,269.02,238.15,260.83,262.2,283.8],"vo":[9.05,9.41,9.09,8.93,9.47,9.41,9.04,8.54],"vr":[null,null,null,null,null,null,null,null],"power":[354.86,339.17,341.02,314.64,405.25,343.35,326.79,274.06]}}/*<</DATA>>*/;

// Shared media-query helper. Every render function previously added a *new*
// `change` listener to a fresh MQL, leaking handlers on every tab switch.
// Using one MQL + a keyed handler map means each key's listener is replaced,
// not stacked.
const _RESPONSIVE_MQ = window.matchMedia('(min-width:900px)');
const _mqHandlers = new Map();
function onBreakpoint(key, handler) {
  const prev = _mqHandlers.get(key);
  if (prev) _RESPONSIVE_MQ.removeEventListener('change', prev);
  _mqHandlers.set(key, handler);
  _RESPONSIVE_MQ.addEventListener('change', handler);
  handler(); // initial apply
}

// Zone from workout slug
function _zoneFromSlug(slug) {
  if (!slug) return 'E';
  if (slug === 'long-run' || slug === 'easy-run') return 'E';
  if (slug === 'goal-pace-touch') return 'M';
  if (slug === 'tempo-run' || slug === 'cruise-intervals') return 'T';
  if (slug === 'short-intervals') return 'I';
  if (slug === 'strides') return 'R';
  if (slug === 'cross-training') return 'X';
  if (slug === 'race-day') return 'Race';
  return 'E';
}

// RACES
function _distKm(dist) {
  if (!dist) return 21.1;
  const d = (dist || '').toLowerCase();
  if (d.includes('half') || d.includes('21')) return 21.1;
  if (d.includes('full') || d.includes('marathon') || d.includes('42')) return 42.195;
  if (d.includes('10k') || d.includes('10 k')) return 10;
  if (d.includes('5k') || d.includes('5 k')) return 5;
  return 21.1;
}

// Build WEEKS from publisher data
const _DAY_OFFSETS = {Mon:0,Tue:1,Wed:2,Thu:3,Fri:4,Sat:5,Sun:6};
function _addDays(iso, n) {
  const d = new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function _kmFromDist(s) {
  if (!s) return 0;
  const m = s.match(/(\d+(?:\.\d+)?)/);
  return m ? parseFloat(m[1]) : 0;
}

const WEEKS = (() => {
  const result = [];
  // Current week from this_week
  if (DATA.this_week) {
    const tw = DATA.this_week;
    result.push({
      weekOf: tw.week_of,
      phase: tw.phase||'Training',
      planned: tw.planned_km||0,
      completed: tw.actual_km||0,
      isCurrent: true,
      sessions: (tw.days||[]).map(d => {
        const done = d.actual || ['completed','missed'].includes(d.status);
        const isRest = !d.has_session;
        return {
          day: d.date,
          zone: isRest ? 'rest' : (_zoneFromSlug(d.workout_slug)||(d.actual ? _zoneFromSlug(d.actual.type) : 'E')),
          workoutId: d.workout_slug||null,
          label: isRest ? 'Rest' : (d.session||'Session'),
          km: d.actual?.distance_km || _kmFromDist(d.distance),
          status: d.actual ? 'done' : (isRest ? 'rest' : 'planned'),
          pace: d.actual?.pace,
          hr: d.actual?.hr,
          target: d.pace||null,
          flag: null,
        };
      }),
    });
  }
  // Future plan weeks
  if (DATA.plan?.weeks) {
    for (const wk of DATA.plan.weeks) {
      if (DATA.this_week && wk.week_of === DATA.this_week.week_of) continue;
      if (wk.is_past) continue;
      // Build 7-day sessions array; plan weeks only have key sessions (no rest days)
      const byDay = {};
      for (const s of (wk.sessions||[])) {
        const offset = _DAY_OFFSETS[s.day] ?? 0;
        const iso = _addDays(wk.week_of, offset);
        byDay[iso] = {
          day: iso, zone: _zoneFromSlug(s.workout_slug)||'E',
          workoutId: s.workout_slug||null,
          label: s.session||'Session',
          km: _kmFromDist(s.distance),
          status: 'planned', target: s.pace||null,
        };
      }
      // Fill rest days
      const daySessions = [];
      for (let i=0; i<7; i++) {
        const iso = _addDays(wk.week_of, i);
        daySessions.push(byDay[iso] || {day:iso, zone:'rest', label:'Rest', km:0, status:'planned'});
      }
      result.push({weekOf:wk.week_of, phase:wk.phase||'Training', planned:wk.planned_km||0, completed:0, isCurrent:false, sessions:daySessions});
    }
  }
  // Fallback if nothing loaded yet
  if (!result.length) {

const PMC = (() => {
  const s = DATA.load?.series;
  if (s?.length) {
    return s.map(p => ({date:p.date, tss:p.tss||0, ctl:p.ctl||0, atl:p.atl||0, tsb:p.tsb||0}));
  }
  const L = DATA.load;
  if (L?.labels?.length) {
    return L.labels.map((d,i) => ({date:d, tss:L.rtss?.[i]||0, ctl:L.ctl?.[i]||0, atl:L.atl?.[i]||0, tsb:L.tsb?.[i]||0}));
  }
  // Generate synthetic 90-day PMC
  const days=90, end=new Date(TODAY+'T00:00:00'), out=[];
  let ctl=42, atl=44;
  for (let i=days-1; i>=0; i--) {
    const d=new Date(end); d.setDate(end.getDate()-i);
    const dow=d.getDay();
    let tss=0;
    if(dow===2)tss=85+Math.random()*20;
    else if(dow===4)tss=95+Math.random()*25;
    else if(dow===0)tss=110+Math.random()*30;
    else if(dow===3||dow===6)tss=45+Math.random()*15;
    else if(dow===5)tss=0;
    else tss=25;
    ctl=ctl+(tss-ctl)/42; atl=atl+(tss-atl)/7;
    out.push({date:d.toISOString().slice(0,10),tss:Math.round(tss),ctl:+ctl.toFixed(1),atl:+atl.toFixed(1),tsb:+(ctl-atl).toFixed(1)});
  }
  return out;
})();

const $  = (sel,el=document) => el.querySelector(sel);
const $$ = (sel,el=document) => Array.from(el.querySelectorAll(sel));

function el(tag, props={}, children=[]) {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(props)) {
    if (k==='class') n.className=v;
    else if (k==='style') n.setAttribute('style',v);
    else if (k==='html') n.innerHTML=v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(),v);
    else if (k==='data') { for (const [dk,dv] of Object.entries(v)) n.dataset[dk]=dv; }
    else n.setAttribute(k,v);
  }
  const kids = Array.isArray(children)?children:[children];
  for (const c of kids) {
    if (c==null||c===false) continue;
    n.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return n;
}

function zchip(zone, label) {
  const Z = ZONES[zone];
  const name = label||(Z?Z.name:zone==='rest'?'Rest':zone);
  return `<span class="zchip" data-zone="${zone}"><span class="dot"></span>${name}</span>`;
}

function fmtDate(iso, opts={}) {
  const d = new Date(iso+'T00:00:00');
  const day = d.toLocaleDateString('en-AU',{weekday:'short'});
  const dm  = d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
  return opts.short ? `${day} ${dm}` : `${day} · ${dm}`;
}

function daysBetween(fromIso, toIso) {
  const a=new Date(fromIso+'T00:00:00'), b=new Date(toIso+'T00:00:00');
  return Math.round((b-a)/86400000);
}

function mdLite(text) {
  if (!text) return '';
  const inlineFmt = s => s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/_(.+?)_/g, '<em>$1</em>');
  const lines = text.split('\n');
  let html = '', inOl = false, inUl = false;
  const closeList = () => {
    if (inOl) { html += '</ol>'; inOl = false; }
    if (inUl) { html += '</ul>'; inUl = false; }
  };
  for (const line of lines) {
    const t = line.trim();
    if (!t) { closeList(); continue; }
    const numM = t.match(/^(\d+)\.\s+(.*)/);
    if (numM) {
      if (!inOl) { closeList(); html += '<ol style="margin:6px 0 6px 18px;padding:0;color:inherit;">'; inOl = true; }
      html += `<li style="margin-bottom:4px;">${inlineFmt(numM[2])}</li>`;
      continue;
    }
    const bulM = t.match(/^[-*]\s+(.*)/);
    if (bulM) {
      if (!inUl) { closeList(); html += '<ul style="margin:6px 0 6px 18px;padding:0;list-style:disc;color:inherit;">'; inUl = true; }
      html += `<li style="margin-bottom:4px;">${inlineFmt(bulM[1])}</li>`;
      continue;
    }
    closeList();
    if (t.startsWith('**')) {
      html += `<div style="font-weight:600;color:var(--ink-2);margin-top:10px;margin-bottom:2px;">${inlineFmt(t)}</div>`;
    } else {
      html += `<div style="margin-bottom:3px;">${inlineFmt(t)}</div>`;
    }
  }
  closeList();
  return html;
}

    if (e.key!=='Enter'&&e.key!==' ') return;
    const host = e.target.closest('[data-link-workout]');
    if (host) { e.preventDefault(); openWorkoutModal(host.dataset.linkWorkout); }
  });
}

// ─── DASHBOARD TAB ────────────────────────────────────────────────────────────
function renderDashboard() {
  const panel = $('#panel-dashboard');
  const thisWeek = WEEKS.find(w=>w.isCurrent) || WEEKS[WEEKS.length-1];
  const nextUp = (thisWeek?.sessions||[]).filter(s=>s.zone!=='rest'&&s.status==='planned').slice(0,3);
  const recent7 = RECENT_RUNS.filter(r=>r.pace&&r.pace!=='—').slice(0,6);
  const avgPace = DATA.meta?.avg_pace || (() => {
    if (!recent7.length) return '—';
    const avgSec = recent7.reduce((a,r)=>{ const clean=(r.pace||'0:00').split(' ')[0]; const [m,s]=clean.split(':').map(Number); return a+(m*60+(s||0)); },0)/recent7.length;
    return isNaN(avgSec)?'—':`${Math.floor(avgSec/60)}:${String(Math.round(avgSec%60)).padStart(2,'0')}`;
  })();
  const aRace = RACES.find(r=>r.priority==='A'&&r.status!=='past') || RACES[RACES.length-1];
  const cRace = RACES.find(r=>r.priority==='C'&&r.status!=='past');

  panel.innerHTML = `
    <div class="card" style="padding:28px 22px;margin-bottom:14px;overflow:hidden;position:relative;">
      <div style="display:grid;grid-template-columns:1fr;gap:22px;align-items:center;" id="hero-grid">
        <div>
          <div class="eyebrow" style="margin-bottom:12px;">${aRace.priority==='A'?'A-Race':'Next Race'} · Goal ${aRace.goal||aRace.predicted||'—'}</div>
          <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;">
            <span class="mono serif" style="font-size:clamp(72px,16vw,132px);font-weight:300;line-height:0.85;letter-spacing:-0.05em;">${daysBetween(TODAY,aRace.date)}</span>
            <span style="font-family:'Fraunces',serif;font-size:clamp(20px,3.5vw,32px);color:var(--ink-2);letter-spacing:-0.02em;font-style:italic;">days to ${aRace.short||aRace.name}</span>
          </div>
          <div style="margin-top:14px;color:var(--ink-3);font-size:13px;max-width:520px;line-height:1.55;">
            ${PHASES.find(p=>TODAY>=p.start&&TODAY<=p.end)?`Current phase <span style="color:var(--z-T);">${PHASES.find(p=>TODAY>=p.start&&TODAY<=p.end).name}</span>. `:''}
            ${cRace?`C-race in <span class="mono" style="color:var(--ink);">${daysBetween(TODAY,cRace.date)} days</span> — ${cRace.short}. ${cRace.mode}.`:''}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;min-width:0;">
          <div class="card tight" style="background:var(--bg-2);">${statBlock({value:avgPace,unit:'/km',label:'Avg pace · 7d',color:'var(--z-M)'})}</div>
          <div class="card tight" style="background:var(--bg-2);">${statBlock({value:VDOT,label:'VDOT',color:'var(--z-E)',note:'Jack Daniels'})}</div>
          <div class="card tight" style="background:var(--bg-2);">${statBlock({value:VO2_CURRENT||DATA.meta?.garmin_vo2_max||'—',unit:'ml/kg/min',label:'VO₂ Max',color:'var(--z-X)',note:'Garmin FR965'})}</div>
        </div>
      </div>
    </div>

    ${renderLoadBanner()}

    <div class="grid" style="grid-template-columns:1fr;gap:14px;margin-bottom:14px;" id="race-grid">
      ${RACES.filter(r=>r.status!=='past').map(r=>raceCard(r)).join('')}
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div class="card-title">This week <span class="aside">${(thisWeek?.phase||'').toUpperCase()} · W/C ${thisWeek?fmtDate(thisWeek.weekOf,{short:true}):''}</span></div>
      <div id="week-strip" style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;">
        ${(thisWeek?.sessions||[]).map(s=>weekTile(s)).join('')}

      <div style="margin-top:14px;display:flex;gap:24px;flex-wrap:wrap;font-size:12px;">
        <div><span class="mono" style="color:var(--ink);font-size:18px;font-weight:500;">${thisWeek?.planned||0}</span> <span style="color:var(--ink-3);font-size:11px;">km planned</span></div>
        <div><span class="mono" style="color:var(--z-M);font-size:18px;font-weight:500;">${(thisWeek?.sessions||[]).filter(s=>['E','M','T','I','R'].includes(s.zone)).length}</span> <span style="color:var(--ink-3);font-size:11px;">key runs</span></div>
        <div><span class="mono" style="color:var(--z-X);font-size:18px;font-weight:500;">${(thisWeek?.sessions||[]).filter(s=>s.zone==='X').length}</span> <span style="color:var(--ink-3);font-size:11px;">cross</span></div>

          ${nextUp.length ? nextUp.map(s=>nextCard(s)).join('') : '<p style="color:var(--ink-3);font-size:13px;margin:0;">No upcoming sessions — all done or rest week.</p>'}

  bindWorkoutLinks(panel);
  drawVolumeChart();
}

function renderLoadBanner() {
  const L = DATA.load || {};
  const cur = L.current || {};
  const flags = L.flags || [];
  const hasStats = cur.ctl != null || cur.atl != null || cur.tsb != null || cur.acwr != null;
  if (!flags.length && !hasStats) return '';
  const levelColor = (lvl) => ({red:'var(--z-R)', yellow:'var(--z-T)', green:'var(--z-M)'}[lvl] || 'var(--z-E)');
  const acwrBand = (a) => {
    if (a == null) return {msg:'', color:'var(--ink-3)'};
    if (a < 0.8) return {msg:'Detraining', color:'var(--z-E)'};
    if (a < 1.3) return {msg:'Sweet spot', color:'var(--z-M)'};
    if (a < 1.5) return {msg:'Elevated', color:'var(--z-T)'};
    return {msg:'Injury risk', color:'var(--z-R)'};
  };
  const acwr = acwrBand(cur.acwr);
  return `<div class="card tight" style="margin-bottom:14px;display:flex;gap:18px;flex-wrap:wrap;align-items:center;">
    <div style="display:flex;gap:18px;flex-wrap:wrap;">
      ${cur.ctl!=null?`<div><div class="eyebrow" style="font-size:9px;">CTL · Fit</div><div class="mono" style="font-size:17px;color:var(--z-E);font-weight:500;">${cur.ctl}</div></div>`:''}
      ${cur.atl!=null?`<div><div class="eyebrow" style="font-size:9px;">ATL · Fatigue</div><div class="mono" style="font-size:17px;color:var(--z-T);font-weight:500;">${cur.atl}</div></div>`:''}
      ${cur.tsb!=null?`<div><div class="eyebrow" style="font-size:9px;">TSB · Form</div><div class="mono" style="font-size:17px;color:${cur.tsb>0?'var(--z-M)':'var(--z-R)'};font-weight:500;">${cur.tsb>0?'+':''}${cur.tsb}</div></div>`:''}
      ${cur.acwr!=null?`<div><div class="eyebrow" style="font-size:9px;">ACWR</div><div class="mono" style="font-size:17px;color:${acwr.color};font-weight:500;">${Number(cur.acwr).toFixed(2)}<span style="font-size:10px;color:var(--ink-3);margin-left:6px;">${acwr.msg}</span></div></div>`:''}
    </div>
    ${flags.length ? `<div style="flex:1;min-width:200px;display:flex;flex-direction:column;gap:4px;">
      ${flags.map(f=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);"><span style="width:6px;height:6px;border-radius:50%;background:${levelColor(f.level)};"></span>${f.msg}</div>`).join('')}
    </div>` : ''}
  </div>`;
}

  const d = daysBetween(TODAY, r.date);
  const isA = r.priority==='A';
  return `<div class="card" style="position:relative;overflow:hidden;">
    <div style="position:absolute;inset:0;background:${isA?'linear-gradient(135deg,color-mix(in oklab,var(--z-Race) 14%,transparent),transparent 60%)':'linear-gradient(135deg,color-mix(in oklab,var(--z-T) 8%,transparent),transparent 60%)'};pointer-events:none;"></div>
    <div style="position:relative;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">

          <div class="eyebrow" style="margin-bottom:6px;">${r.mode}</div>
          <div style="font-family:'Fraunces',serif;font-weight:500;font-size:22px;letter-spacing:-0.02em;line-height:1.1;">${r.name} <span style="font-size:15px;color:var(--ink-3);font-weight:400;">— ${r.distanceKm} km</span></div>
        </div>
        <span class="${isA?'badge-gold':'zchip'}" ${!isA?'data-zone="T"':''}>${isA?'★ A-Race':r.priority+'-Race'}</span>
      </div>

        <div>

          <div class="mono" style="font-size:26px;font-weight:600;color:${isA?'var(--z-Race)':'var(--ink)'};">${d}<span style="font-size:11px;color:var(--ink-3);margin-left:4px;">d</span></div>
          <div class="mono" style="font-size:10px;color:var(--ink-3);margin-top:2px;">${fmtDate(r.date,{short:true})}</div>

        </div>`:`<div><div class="eyebrow" style="font-size:9px;margin-bottom:4px;">Goal</div><div class="mono" style="font-size:18px;font-weight:500;color:var(--ink-3);">Not set</div></div>`}
        <div>

          <div class="mono" style="font-size:10px;color:var(--ink-3);margin-top:2px;">${r.predicted?calcPace(r.predicted,r.distanceKm)+'/km predicted pace':'VDOT '+VDOT}</div>
        </div>
      </div>
    </div>
  </div>`;

function calcPace(time, km) {
  const parts = time.split(':').map(Number);
  let secs = parts.length===3 ? parts[0]*3600+parts[1]*60+parts[2] : parts[0]*60+parts[1];
  const p = secs/km;
  return `${Math.floor(p/60)}:${String(Math.round(p%60)).padStart(2,'0')}`;
}

function weekTile(s) {
  const dow = new Date(s.day+'T00:00:00').toLocaleDateString('en-AU',{weekday:'narrow'});
  const dayN = new Date(s.day+'T00:00:00').getDate();
  const z = s.zone, done = s.status==='done', isToday = s.day===TODAY;
  const Z = ZONES[z], color = z==='rest'?'var(--ink-4)':(Z?Z.color:'var(--ink-3)');
  return `<div ${s.workoutId?`data-link-workout="${s.workoutId}" tabindex="0" role="button"`:''}
    class="session-card" style="border:1px solid ${isToday?'var(--line-2)':'var(--line)'};border-radius:10px;padding:8px 6px;min-height:92px;display:flex;flex-direction:column;justify-content:space-between;background:${isToday?'var(--card-hi)':'transparent'};position:relative;">
    ${isToday?`<div style="position:absolute;top:-1px;left:-1px;right:-1px;height:2px;background:var(--accent);border-radius:10px 10px 0 0;"></div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:baseline;">
      <span class="mono" style="font-size:10px;color:var(--ink-3);letter-spacing:0.05em;">${dow}</span>
      <span class="mono" style="font-size:11px;color:${isToday?'var(--accent)':'var(--ink-2)'};font-weight:500;">${dayN}</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;margin-top:4px;">
      <div style="width:100%;height:3px;background:${z==='rest'?'var(--z-rest)':color};border-radius:2px;opacity:${done?1:0.55};"></div>
      <div style="font-size:10px;color:${z==='rest'?'var(--ink-4)':'var(--ink)'};font-weight:500;line-height:1.2;">${s.label}</div>
      ${s.km?`<div class="mono" style="font-size:10px;color:var(--ink-3);">${s.km}<span style="color:var(--ink-4);">km</span></div>`:''}
    </div>
    ${done?`<div style="position:absolute;top:6px;right:6px;"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M1.5 5 L4 7.5 L8.5 2.5" stroke="${color==='var(--ink-4)'?'var(--ink-3)':color}" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`:''}
  </div>`;
}

      <div class="mono" style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.1em;">${day.split(' ')[0]}</div>
      <div class="mono" style="font-size:20px;font-weight:600;">${new Date(s.day+'T00:00:00').getDate()}</div>
    </div>
    <div style="min-width:0;">
      <div style="font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px;">${s.label}</div>

function drawVolumeChart() {
  const ctx = $('#volume-chart'); if(!ctx) return;
  const s = getComputedStyle(document.documentElement);
  new Chart(ctx, {
    type:'bar',
    data:{
      labels: WEEKLY_VOLUME.map(w=>w.week),
      datasets:[{
        data: WEEKLY_VOLUME.map(w=>w.km),

// ─── CALENDAR TAB ─────────────────────────────────────────────────────────────
function renderCalendar() {
  const panel = $('#panel-calendar');
  const byDate = {};
  for (const w of WEEKS) for (const s of w.sessions) byDate[s.day] = s;
  for (const r of RACES) if (r.date) byDate[r.date] = {day:r.date,zone:'Race',label:r.short,workoutId:'race-day',km:r.distanceKm,status:'planned',isRace:true};

  const todayD = new Date(TODAY+'T00:00:00');
  const curMonth = {year:todayD.getFullYear(), month:todayD.getMonth()};

  panel.innerHTML = `<div class="card" style="margin-bottom:14px;">
    <div class="card-title">Calendar</div>
    <div id="cal-grid">
      ${renderMonth(curMonth,byDate)}
    </div>
    <div style="margin-top:18px;padding-top:18px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:10px;">
      ${['E','M','T','I','R','X','Race'].map(z=>zchip(z,ZONES[z].name)).join('')}
      <span class="zchip" data-zone="rest"><span class="dot"></span>Rest</span>
    </div>
  </div>`;
  bindWorkoutLinks(panel);
}

function renderMonth({year,month},byDate) {
  const first = new Date(year,month,1);
  const monthName = first.toLocaleDateString('en-AU',{month:'long'});
  const daysInMonth = new Date(year,month+1,0).getDate();
  const startDow = (first.getDay()+6)%7;
  const cells = [];
  for (let i=0;i<startDow;i++) cells.push('<div></div>');
  for (let d=1;d<=daysInMonth;d++) {
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push(renderDay(d,iso,byDate[iso],iso===TODAY,iso<TODAY));
  }
  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
      <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:500;letter-spacing:-0.02em;">${monthName} <span class="mono" style="font-size:13px;color:var(--ink-4);margin-left:4px;">${year}</span></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;">
      ${['M','T','W','T','F','S','S'].map(x=>`<div style="text-align:center;font-size:9px;color:var(--ink-4);letter-spacing:0.14em;font-weight:600;">${x}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">${cells.join('')}</div>
  </div>`;
}

function renderDay(d,iso,s,isToday,isPast) {
  if (!s) return `<div style="aspect-ratio:1;border:1px solid var(--line);border-radius:6px;padding:4px;display:flex;flex-direction:column;">
    <div class="mono" style="font-size:10px;color:var(--ink-4);">${d}</div></div>`;
  const z=s.zone, Z=ZONES[z], color=z==='rest'?'var(--ink-4)':(Z?.color||'var(--ink-3)');
  const isRace=s.isRace;
  const bg=isRace?'linear-gradient(135deg,color-mix(in oklab,var(--z-Race) 30%,transparent),color-mix(in oklab,var(--z-R) 20%,transparent))':`color-mix(in oklab,${color} ${isPast?'10%':'16%'},transparent)`;
  return `<div ${s.workoutId?`data-link-workout="${s.workoutId}" tabindex="0" role="button"`:''}
    style="aspect-ratio:1;border:1px solid ${isToday?'var(--accent)':(isRace?'color-mix(in oklab,var(--z-Race) 50%,transparent)':'var(--line)')};border-radius:6px;padding:4px;display:flex;flex-direction:column;justify-content:space-between;background:${z==='rest'?'transparent':bg};cursor:${s.workoutId?'pointer':'default'};position:relative;overflow:hidden;min-height:56px;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;">
      <span class="mono" style="font-size:10px;color:${isToday?'var(--accent)':'var(--ink-3)'};font-weight:${isToday?600:400};">${d}</span>
      ${s.status==='done'?`<svg width="8" height="8" viewBox="0 0 10 10"><path d="M1.5 5 L4 7.5 L8.5 2.5" stroke="${color==='var(--ink-4)'?'var(--ink-3)':color}" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:2px;min-width:0;">
      ${z!=='rest'?`<div title="${isRace?'★ '+s.label:Z?.name||z}" style="font-size:9px;color:${color};font-weight:600;letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${isRace?'★ '+s.label:Z?.name||z}</div>`:`<div style="font-size:9px;color:var(--ink-4);">Rest</div>`}
      ${s.km?`<div class="mono" style="font-size:9px;color:var(--ink-3);">${s.km}km</div>`:''}
    </div>
  </div>`;
}

// ─── PLAN TAB ─────────────────────────────────────────────────────────────────
function renderPlan() {
  const panel = $('#panel-plan');
  const totalDays = daysBetween(PHASES[0].start, PHASES[PHASES.length-1].end)||1;
  const todayOffset = daysBetween(PHASES[0].start, TODAY);

  panel.innerHTML = `
    <div class="card" style="margin-bottom:14px;">
      <div class="card-title">Phase timeline <span class="aside">${fmtDate(PHASES[0].start,{short:true})} → ${fmtDate(PHASES[PHASES.length-1].end,{short:true})} · build to A-race</span></div>
      <div style="position:relative;padding:14px 0 22px;">
        <div style="display:flex;width:100%;height:36px;border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--line);">
          ${PHASES.map(p=>{
            const dur=daysBetween(p.start,p.end)||1, w=(dur/totalDays)*100;
            const isCurrent=TODAY>=p.start&&TODAY<=p.end;
            return `<div style="flex:0 0 ${w}%;background:${isCurrent?`color-mix(in oklab,${p.accent} 24%,var(--card))`:`color-mix(in oklab,${p.accent} 10%,var(--card))`};border-right:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:0 8px;">
              <span style="font-size:10px;font-weight:600;color:${isCurrent?p.accent:'var(--ink-2)'};letter-spacing:0.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name.toUpperCase()}</span>
            </div>`;
          }).join('')}
          <div style="position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--accent);left:${Math.max(0,Math.min(100,(todayOffset/totalDays)*100))}%;box-shadow:0 0 10px var(--accent);"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;">
          <span class="mono" style="font-size:10px;color:var(--ink-4);">${fmtDate(PHASES[0].start,{short:true})}</span>
          <span class="mono" style="font-size:10px;color:var(--accent);">● today</span>
          <span class="mono" style="font-size:10px;color:var(--ink-4);">${fmtDate(PHASES[PHASES.length-1].end,{short:true})} · A-race</span>
        </div>
      </div>
    </div>
    <div class="card flush" style="margin-bottom:14px;">
      <div style="padding:18px 18px 10px;"><div class="card-title">Weekly plan <span class="aside">click a week to expand</span></div></div>
      <div id="weeks-list">${WEEKS.map((w,i)=>weekRow(w,i)).join('')}</div>
    </div>`;

  $('#weeks-list').addEventListener('click', e => {
    const hdr = e.target.closest('[data-week-header]'); if(!hdr) return;
    const row = hdr.closest('[data-week]');
    const body = $('[data-week-body]',row);
    const open = row.dataset.open==='true';
    row.dataset.open = !open;
    body.style.display = open?'none':'block';
    $('[data-chevron]',hdr).style.transform = open?'rotate(0)':'rotate(90deg)';
  });
  bindWorkoutLinks(panel);
}

function weekRow(w,i) {
  const phase = PHASES.find(p=>p.name===w.phase);
  const accent = phase?phase.accent:'var(--ink-3)';
  const isCurrent = w.isCurrent;
  const keyRuns = w.sessions.filter(s=>s.zone!=='rest'&&s.zone!=='X');
  const keyRunLabels = keyRuns.slice(0,3).map(s=>`
    <div data-link-workout="${s.workoutId||''}" tabindex="0" role="button" style="display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;background:var(--bg-2);cursor:pointer;">
      ${zchip(s.zone)}
      <span class="mono" style="font-size:11px;color:var(--ink-2);">${s.km||0}km</span>
    </div>`).join('');
  return `<div data-week data-open="${isCurrent?'true':'false'}" style="border-top:1px solid var(--line);">
    <div data-week-header style="display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:14px 18px;cursor:pointer;">
      <div style="display:flex;align-items:center;gap:10px;">
        <svg data-chevron width="10" height="10" viewBox="0 0 10 10" style="transform:${isCurrent?'rotate(90deg)':'rotate(0)'};transition:transform .2s;color:var(--ink-3);"><path d="M3 1 L7 5 L3 9" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
        <div>
          <div style="font-family:'Fraunces',serif;font-size:16px;font-weight:500;letter-spacing:-0.01em;">Week of ${fmtDate(w.weekOf,{short:true})}</div>
          <div style="display:flex;gap:10px;align-items:center;margin-top:3px;">
            <span style="font-size:10px;color:${accent};font-weight:600;letter-spacing:0.1em;text-transform:uppercase;">● ${w.phase}</span>
            ${isCurrent?`<span class="mono" style="font-size:10px;color:var(--accent);letter-spacing:0.05em;">THIS WEEK</span>`:''}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">${keyRunLabels}</div>
      <div style="text-align:right;">
        <div class="mono" style="font-size:18px;font-weight:500;">${w.planned}<span style="font-size:10px;color:var(--ink-4);margin-left:2px;">km</span></div>
        ${w.completed>0?`<div class="mono" style="font-size:10px;color:var(--z-M);">${w.completed} done</div>`:''}
      </div>
    </div>
    <div data-week-body style="display:${isCurrent?'block':'none'};padding:0 18px 18px;background:var(--bg-2);border-top:1px solid var(--line);">
      <div style="display:grid;grid-template-columns:1fr;gap:6px;padding-top:14px;">
        ${w.sessions.map(s=>sessionDetail(s)).join('')}
      </div>
    </div>
  </div>`;
}

function sessionDetail(s) {
  const Z = ZONES[s.zone], color = s.zone==='rest'?'var(--ink-4)':(Z?.color||'var(--ink-3)');
  const dow = new Date(s.day+'T00:00:00').toLocaleDateString('en-AU',{weekday:'short'});
  const done = s.status==='done';
  return `<div ${s.workoutId?`data-link-workout="${s.workoutId}" tabindex="0" role="button"`:''}
    style="display:grid;grid-template-columns:40px 100px 1fr auto;gap:12px;align-items:center;padding:10px 12px;border-radius:8px;background:var(--card);border:1px solid var(--line);${s.workoutId?'cursor:pointer;':''}">
    <div style="width:3px;height:28px;background:${color};border-radius:2px;opacity:${done?1:0.55};"></div>
    <div>
      <div class="mono" style="font-size:10px;color:var(--ink-3);text-transform:uppercase;">${dow}</div>
      <div class="mono" style="font-size:13px;font-weight:500;">${new Date(s.day+'T00:00:00').getDate()} ${new Date(s.day+'T00:00:00').toLocaleDateString('en-AU',{month:'short'})}</div>
    </div>
    <div style="min-width:0;">
      <div style="font-size:13px;font-weight:500;margin-bottom:3px;">${s.label}</div>
      <div style="display:flex;gap:8px;align-items:center;">
        ${s.zone!=='rest'?zchip(s.zone):''}
        <span class="mono" style="font-size:10px;color:var(--ink-3);">${s.target||s.pace||''}</span>
        ${s.hr?`<span class="mono" style="font-size:10px;color:var(--z-R);">HR ${s.hr}</span>`:''}
        ${s.flag?`<span class="mono" style="font-size:10px;color:var(--z-T);">⚑ ${s.flag}</span>`:''}
      </div>
    </div>
    <div style="text-align:right;">
      ${s.km?`<div class="mono" style="font-size:14px;font-weight:500;">${s.km}<span style="font-size:9px;color:var(--ink-4);">km</span></div>`:''}
      ${done?`<div class="mono" style="font-size:9px;color:var(--z-M);letter-spacing:0.1em;">● DONE</div>`:`<div class="mono" style="font-size:9px;color:var(--ink-4);letter-spacing:0.1em;">○ ${s.zone==='rest'?'REST':'PLANNED'}</div>`}
    </div>
  </div>`;
}

          <div class="mono serif" style="font-size:30px;font-weight:500;line-height:1;color:var(--z-E);">${VO2_CURRENT ?? '—'}</div>
          <div class="eyebrow">ml/kg/min · current</div>
          <div class="eyebrow" style="margin-left:auto;">VDOT ${VDOT} (Daniels)</div>
        </div>
        <div class="chart-wrap" style="height:150px;"><canvas id="vo2-chart"></canvas></div>
        <div class="aside" style="margin-top:8px;">Garmin's running VO2 max is a physiological estimate from HR + pace. VDOT (Daniels) is derived from race performance — the two measure different things and often differ.</div>
      </div>
      <div class="card">
        <div class="card-title">Predicted race times <span class="aside">at VDOT ${VDOT}</span></div>

          ${PREDICTIONS.map(p=>`<tr>
            <td style="color:var(--ink-2);font-size:13px;">${p.dist}</td>
            <td style="text-align:right;"><span class="mono" style="font-size:14px;font-weight:500;">${p.time}</span></td>

        </tbody></table>

  onBreakpoint('metrics', () => ['#metric-grid-1','#metric-grid-2','#metric-grid-3'].forEach(id=>{ const el=$(id); if(el) el.style.gridTemplateColumns=_RESPONSIVE_MQ.matches?'repeat(2,1fr)':'1fr'; }));

  drawPMC(); drawEF(); drawDecouple(); drawZone(); drawDynamics(); drawVO2();

function drawVO2() {
  const ctx=$('#vo2-chart'); if(!ctx) return;
  if (!VO2_HISTORY.length) return;
  const s=getComputedStyle(document.documentElement);
  new Chart(ctx,{type:'line',data:{
    labels:VO2_HISTORY.map(v => {
      const d = new Date(v.date+'T00:00:00');
      return isNaN(d) ? v.date : d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    }),
    datasets:[{data:VO2_HISTORY.map(v=>v.vo2), borderColor:s.getPropertyValue('--z-E').trim(), backgroundColor:`color-mix(in oklab,${s.getPropertyValue('--z-E').trim()} 15%,transparent)`, fill:true, tension:0.35, pointRadius:0, borderWidth:2}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      x:{grid:{display:false},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:10},maxTicksLimit:6,maxRotation:0}},
      y:{grid:{color:s.getPropertyValue('--line').trim()},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:10,family:"'JetBrains Mono',monospace"}}}
    }}});
}

function calcPaceFromTime(time, dist) {
  const parts = time.split(':').map(Number);
  let secs = parts.length===3?parts[0]*3600+parts[1]*60+parts[2]:parts[0]*60+parts[1];
  const km = {'1 mile':1.609,'5K':5,'10K':10,'HM':21.0975,'Full M':42.195}[dist]||1;
  const p = secs/km;
  return `${Math.floor(p/60)}:${String(Math.round(p%60)).padStart(2,'0')}/km`;
}

function drawPMC() {
  const ctx=$('#pmc-chart'); if(!ctx) return;
  const s=getComputedStyle(document.documentElement);
  // Use time axis only when labels are ISO dates (synthetic fallback); otherwise categorical
  const firstDate=PMC[0]?.date||'';
  const isIso=/^\d{4}-\d{2}-\d{2}$/.test(firstDate);
  const xAxis=isIso
    ?{type:'time',time:{unit:'week'},grid:{color:s.getPropertyValue('--line').trim()},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:10}}}
    :{grid:{color:s.getPropertyValue('--line').trim()},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:10},maxTicksLimit:8,maxRotation:0}};
  new Chart(ctx,{type:'line',data:{labels:PMC.map(p=>p.date),datasets:[
    {label:'CTL',data:PMC.map(p=>p.ctl),borderColor:s.getPropertyValue('--z-E').trim(),backgroundColor:'transparent',borderWidth:2,tension:0.3,pointRadius:0},
    {label:'ATL',data:PMC.map(p=>p.atl),borderColor:s.getPropertyValue('--z-T').trim(),backgroundColor:'transparent',borderWidth:2,tension:0.3,pointRadius:0,borderDash:[4,3]},
    {label:'TSB',data:PMC.map(p=>p.tsb),borderColor:s.getPropertyValue('--z-M').trim(),backgroundColor:'transparent',borderWidth:1.5,tension:0.3,pointRadius:0,yAxisID:'y2'},
  ]},options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    scales:{
      x:xAxis,
      y:{grid:{color:s.getPropertyValue('--line').trim()},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:10,family:"'JetBrains Mono',monospace"}}},
      y2:{position:'right',grid:{display:false},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:10,family:"'JetBrains Mono',monospace"}}},
    },plugins:{tooltip:{mode:'index',intersect:false}}}});
}

function drawEF() {
  const ctx=$('#ef-chart'); if(!ctx) return;
  const s=getComputedStyle(document.documentElement);
  new Chart(ctx,{type:'line',data:{labels:EF_TREND.map(e=>e.label),datasets:[{data:EF_TREND.map(e=>e.ef),borderColor:s.getPropertyValue('--z-M').trim(),backgroundColor:`color-mix(in oklab,${s.getPropertyValue('--z-M').trim()} 15%,transparent)`,fill:true,tension:0.35,pointRadius:0,borderWidth:2}]},
    options:{maintainAspectRatio:false,scales:{
      x:{grid:{display:false},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:10},maxTicksLimit:6,maxRotation:0}},
      y:{grid:{color:s.getPropertyValue('--line').trim()},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:10,family:"'JetBrains Mono',monospace"}}}
    }}});
}

function drawDecouple() {
  const ctx=$('#decouple-chart'); if(!ctx) return;
  const s=getComputedStyle(document.documentElement);
  const validD=DECOUPLING.filter(d=>d.pct!=null);
  if(!validD.length) return;
  const fmt = d => {
    // Prefer ISO → 'd Mon'; fall back to the chart label string itself.
    if (d.date && /^\d{4}-\d{2}-\d{2}$/.test(d.date)) {
      const dt = new Date(d.date + 'T00:00:00');
      if (!isNaN(dt)) return dt.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    }
    return d.label || d.date || '';
  };
  new Chart(ctx,{type:'bar',data:{
    labels:validD.map(fmt),
    datasets:[{data:validD.map(d=>d.pct),backgroundColor:validD.map(d=>d.pct<5?s.getPropertyValue('--z-M').trim():s.getPropertyValue('--z-T').trim()),borderRadius:3,barThickness:16}]},
    options:{maintainAspectRatio:false,scales:{x:{grid:{display:false},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:10}}},y:{grid:{color:s.getPropertyValue('--line').trim()},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:10,family:"'JetBrains Mono',monospace"},callback:v=>v+'%'}}},plugins:{tooltip:{callbacks:{label:c=>c.parsed.y+'% drift'}}}},
    plugins:[{id:'refLine',afterDraw:(chart)=>{const ys=chart.scales.y,y=ys.getPixelForValue(5),ct=chart.ctx;ct.save();ct.strokeStyle='rgba(255,193,74,0.4)';ct.setLineDash([4,4]);ct.beginPath();ct.moveTo(chart.chartArea.left,y);ct.lineTo(chart.chartArea.right,y);ct.stroke();ct.fillStyle=s.getPropertyValue('--z-T').trim();ct.font='10px JetBrains Mono';ct.fillText('5% threshold',chart.chartArea.right-80,y-4);ct.restore();}}]});
}

function drawZone() {
  const ctx=$('#zone-chart'); if(!ctx) return;
  const s=getComputedStyle(document.documentElement);
  const ink3=s.getPropertyValue('--ink-3').trim();
  new Chart(ctx,{type:'doughnut',data:{labels:ZONE_DISTRIBUTION.map(z=>ZONES[z.zone]?.name||z.zone),datasets:[{data:ZONE_DISTRIBUTION.map(z=>z.pct),backgroundColor:ZONE_DISTRIBUTION.map(z=>ZONES[z.zone]?.color||ink3),borderColor:s.getPropertyValue('--card').trim(),borderWidth:3,hoverOffset:6}]},options:{maintainAspectRatio:false,cutout:'68%',plugins:{tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed}%`}}}}});
}

function drawDynamics() {
  const ctx=$('#dynamics-chart'); if(!ctx) return;
  const s=getComputedStyle(document.documentElement);
  new Chart(ctx,{type:'line',data:{labels:DYNAMICS.map(d=>d.i),datasets:[
    {label:'Cadence',data:DYNAMICS.map(d=>d.cadence),borderColor:s.getPropertyValue('--z-E').trim(),tension:0.3,pointRadius:0,borderWidth:1.8},
    {label:'GCT',data:DYNAMICS.map(d=>d.gct),borderColor:s.getPropertyValue('--z-I').trim(),tension:0.3,pointRadius:0,borderWidth:1.8,yAxisID:'y2'},
  ]},options:{maintainAspectRatio:false,scales:{x:{display:false},y:{position:'left',grid:{color:s.getPropertyValue('--line').trim()},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:9,family:"'JetBrains Mono',monospace"}}},y2:{position:'right',grid:{display:false},border:{display:false},ticks:{color:s.getPropertyValue('--ink-4').trim(),font:{size:9,family:"'JetBrains Mono',monospace"}}}}}});
}

// ─── APP BOOT ─────────────────────────────────────────────────────────────────
function boot() {
  chartDefaults();
  applyTheme();
  setupTabs();
  setupModal();
  setupThemeToggle();

  const now = new Date(TODAY+'T00:00:00');
  const todayEl = $('#today-str');
  if (todayEl) {
    const parts = now.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'}).split(', ');
    todayEl.textContent = parts.join(' · ');
  }

  document.title = `Training — VDOT ${VDOT}`;

  renderDashboard();
  renderCalendar();
  renderPlan();
  renderMetrics();
  renderTraining();
  renderNutrition();

  const saved = localStorage.getItem('rd.tab');
  if (saved) activateTab(saved);
}

function applyTheme() {
  const t = DATA.theme||'dark';
  document.documentElement.setAttribute('data-theme', t);
  const moon = document.querySelector('#theme-toggle .icon-moon');
  const sun  = document.querySelector('#theme-toggle .icon-sun');
  if (moon && sun) {
    moon.style.display = t==='dark' ? 'block' : 'none';
    sun.style.display  = t==='dark' ? 'none'  : 'block';
  }
}

function setupTabs() {
  $$('.tab').forEach(btn=>btn.addEventListener('click',()=>activateTab(btn.dataset.tab)));
  $$('.mobile-nav button').forEach(btn=>btn.addEventListener('click',()=>activateTab(btn.dataset.tab)));
}

function activateTab(name) {
  $$('.tab').forEach(b=>b.setAttribute('aria-selected',b.dataset.tab===name));
  $$('.mobile-nav button').forEach(b=>b.setAttribute('aria-selected',b.dataset.tab===name));
  $$('.panel').forEach(p=>p.classList.toggle('active',p.id===`panel-${name}`));
  localStorage.setItem('rd.tab',name);
  window.scrollTo({top:0,behavior:'instant'});
}

function setupModal() {
  const bd = $('#modal-backdrop');
  bd.addEventListener('click',e=>{ if(e.target===bd) closeModal(); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
}

function setupThemeToggle() {
  $('#theme-toggle').addEventListener('click',()=>{
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur==='dark'?'light':'dark';
    DATA.theme = next;
    applyTheme();
    // Destroy and redraw charts — colors are cached
    Chart.instances && Object.values(Chart.instances).forEach(c=>c.destroy());
    chartDefaults();
    renderMetrics();
    renderDashboard();
  });
}

if (document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>
